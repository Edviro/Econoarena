<!DOCTYPE html>

<head>
    <meta charset="UTF-8">

    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f3f4f6; /* Light gray background */
        }
        /* Fixed Sidebar Styling */
        .sidebar {
            position: fixed;
            top: 0;
            left: 0;
            height: 100vh; /* Full viewport height */
            transition: width 0.3s ease;
            z-index: 1000; /* Ensure sidebar is on top */
        }
        .sidebar.collapsed {
            width: 64px; /* w-16 */
        }
        .sidebar:not(.collapsed) {
            width: 256px; /* w-64 */
        }
        /* Main Content Adjustment for Fixed Sidebar */
        .main-content {
            margin-left: 256px; /* Initial margin to accommodate sidebar */
            transition: margin-left 0.3s ease;
            flex-grow: 1; /* Allow content to grow */
        }
        .main-content.expanded {
            margin-left: 64px; /* Adjusted margin when sidebar is collapsed */
        }
        /* Ensure nav text hides properly */
        .nav-text.hidden {
            display: none;
        }
        /* Hide title when sidebar is collapsed */
        .sidebar.collapsed h1 {
            display: none;
        }
        /* Adjust toggle button for collapsed state */
        .sidebar.collapsed #toggleSidebar {
            margin-left: auto; /* Push to the right */
        }
        /* Adjust nav items when collapsed to center icons */
        .sidebar.collapsed .flex.items-center {
            justify-content: center; /* Center icons when text is hidden */
        }
        .sidebar.collapsed .flex.items-center .mr-3 {
            margin-right: 0; /* Remove right margin from icon when collapsed */
        }
        /* Larger icons when sidebar is collapsed */
        .sidebar.collapsed .flex.items-center svg {
            width: 32px; /* Adjusted from 40px to 32px for better fit, still larger than default */
            height: 32px; /* Adjusted from 40px to 32px for better fit, still larger than default */
        }
        /* Ensure chart canvases fill their container and maintain aspect ratio within bounds */
        .chart-container {
            position: relative;
            height: 256px; /* Fixed height for consistency, h-64 */
            width: 100%;
        }
        canvas {
            width: 100% !important;
            height: 100% !important;
        }
        /* Style for clickable KPI cards */
        .kpi-card {
            cursor: pointer;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }
        .kpi-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
        }
    </style>
</head>

                    <h3 class="text-xl font-semibold text-gray-800 mb-4">Configuración de Seguridad</h3>
                    <p class="text-gray-700 mb-4">Administra usuarios, roles y permisos, y revisa los logs de auditoría del sistema.</p>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">

                                <span class="text-sm text-red-500">IP: 192.168.1.100 - Hace 10 minutos</span>
                            </div>
                        </li>
                        <li class="py-3 flex justify-between items-center">
                            <div>
                                <p class="text-gray-800">Usuario: 'maria.g' - Exitoso</p>
                                <span class="text-sm text-green-500">IP: 192.168.1.101 - Hace 25 minutos</span>
                            </div>
                        </li>
                    </ul>
                </div>
            `,
            'Configuración': `
                <div class="bg-white p-6 rounded-lg shadow-md">
                    <h3 class="text-xl font-semibold text-gray-800 mb-4">Parámetros del Sistema</h3>
                    <p class="text-gray-700 mb-4">Ajusta la configuración general del sistema, como unidades de medida, categorías y ubicaciones.</p>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <button class="bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-2 px-4 rounded-lg shadow-md transition-colors duration-200">Gestionar Unidades de Medida</button>
                        <button class="bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-2 px-4 rounded-lg shadow-md transition-colors duration-200">Gestionar Categorías</button>
                        <button class="bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-2 px-4 rounded-lg shadow-md transition-colors duration-200">Gestionar Almacenes/Ubicaciones</button>
                        <button class="bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-2 px-4 rounded-lg shadow-md transition-colors duration-200">Configurar Alertas</button>
                    </div>
                </div>
            `,
            'Alertas': `
                <div class="bg-white p-6 rounded-lg shadow-md">
                    <h3 class="text-xl font-semibold text-gray-800 mb-4">Alertas del Sistema</h3>
                    <p class="text-gray-700 mb-4">Revisa todas las notificaciones y alertas generadas por el sistema.</p>
                    <ul class="divide-y divide-gray-200">
                        <li class="py-3 flex justify-between items-center">
                            <div>
                                <p class="text-gray-800">Alerta: Stock mínimo de 'Producto A'</p>
                                <span class="text-sm text-red-500">Ubicación: Almacén Principal - Hace 5 minutos</span>
                            </div>
                            <span class="px-2 py-1 text-xs font-semibold text-red-800 bg-red-100 rounded-full">Urgente</span>
                        </li>
                        <li class="py-3 flex justify-between items-center">

                                <p class="text-gray-800">Alerta: Producto 'Producto C' próximo a vencer</p>

        };

        // Function to load module content
        function loadModule(moduleName, subTitle = '') {
            moduleTitle.textContent = moduleName + (subTitle ? ` - ${subTitle}` : '');
            dynamicContent.innerHTML = moduleContents[moduleName] || `<div class="bg-white p-6 rounded-lg shadow-md text-gray-700 text-center text-xl min-h-[300px] flex items-center justify-center">Contenido para el módulo de ${moduleName}${subTitle ? ` (${subTitle})` : ''} estará aquí.</div>`;

            // If loading the Dashboard, re-initialize charts
            if (moduleName === 'Dashboard') {
                // Small delay to ensure DOM is updated before chart initialization
                setTimeout(initializeCharts, 100);
            }
        }

        // Sidebar toggle functionality
        toggleSidebarBtn.addEventListener('click', () => {
            sidebar.classList.toggle('collapsed');
            mainContent.classList.toggle('expanded');

            navTexts.forEach(text => {
                text.classList.toggle('hidden');
            });

            // Adjust title visibility based on sidebar state
            const title = sidebar.querySelector('h1');
            if (sidebar.classList.contains('collapsed')) {
                title.classList.add('hidden');
            } else {
                title.classList.remove('hidden');
            }
        });

        // Initialize sidebar state on load and resize
        function adjustSidebarForScreenSize() {
            if (window.innerWidth < 768) { // md breakpoint in Tailwind is 768px
                sidebar.classList.add('collapsed');
                mainContent.classList.add('expanded');
                navTexts.forEach(text => text.classList.add('hidden'));
                sidebar.querySelector('h1').classList.add('hidden');
            } else {
                sidebar.classList.remove('collapsed');
                mainContent.classList.remove('expanded');
                navTexts.forEach(text => text.classList.remove('hidden'));
                sidebar.querySelector('h1').classList.remove('hidden');
            }
        }

        // Chart Initialization Function
        function initializeCharts() {
            // Destroy existing charts if they exist to prevent duplicates
            Chart.getChart('movementTrendsChart')?.destroy();
            Chart.getChart('abcAnalysisChart')?.destroy();
            Chart.getChart('locationHeatmapChart')?.destroy();
            Chart.getChart('consumptionReplenishmentChart')?.destroy();

            // Movement Trends Chart
            const movementTrendsCtx = document.getElementById('movementTrendsChart')?.getContext('2d');
            if (movementTrendsCtx) {
                new Chart(movementTrendsCtx, {
                    type: 'line',
                    data: {
                        labels: ['Ene', 'Feb', 'Mar', 'Abr', 'May', 'Jun'],
                        datasets: [{
                            label: 'Entradas',
                            data: [65, 59, 80, 81, 56, 55],
                            borderColor: 'rgb(75, 192, 192)',
                            tension: 0.1,
                            fill: false
                        }, {
                            label: 'Salidas',
                            data: [28, 48, 40, 19, 86, 27],
                            borderColor: 'rgb(255, 99, 132)',
                            tension: 0.1,
                            fill: false
                        }]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        scales: {
                            y: {
                                beginAtZero: true
                            }
                        }
                    }
                });
            }


            // ABC Analysis Chart (Pie Chart for product categories)
            const abcAnalysisCtx = document.getElementById('abcAnalysisChart')?.getContext('2d');
            if (abcAnalysisCtx) {
                new Chart(abcAnalysisCtx, {
                    type: 'pie',
                    data: {
                        labels: ['Categoría A (Alto Valor)', 'Categoría B (Medio Valor)', 'Categoría C (Bajo Valor)'],
                        datasets: [{
                            data: [50, 30, 20],
                            backgroundColor: [
                                'rgb(255, 99, 132)',
                                'rgb(54, 162, 235)',
                                'rgb(255, 205, 86)'
                            ],
                            hoverOffset: 4
                        }]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                    }
                });
            }

            // Location Heatmap Chart (Bar chart for stock by warehouse)
            const locationHeatmapCtx = document.getElementById('locationHeatmapChart')?.getContext('2d');
            if (locationHeatmapCtx) {
                new Chart(locationHeatmapCtx, {
                    type: 'bar',
                    data: {
                        labels: ['Almacén Principal', 'Almacén Secundario', 'Zona de Cuarentena', 'Almacén Remoto'],
                        datasets: [{
                            label: 'Stock por Almacén',
                            data: [5000, 3000, 500, 1500],
                            backgroundColor: [
                                'rgba(75, 192, 192, 0.6)',
                                'rgba(54, 162, 235, 0.6)',
                                'rgba(255, 99, 132, 0.6)',
                                'rgba(153, 102, 255, 0.6)'
                            ],
                            borderColor: [
                                'rgba(75, 192, 192, 1)',
                                'rgba(54, 162, 235, 1)',
                                'rgba(255, 99, 132, 1)',
                                'rgba(153, 102, 255, 1)'
                            ],
                            borderWidth: 1
                        }]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        scales: {
                            y: {
                                beginAtZero: true
                            }
                        }
                    }
                });
            }

            // Consumption vs Replenishment Chart
            const consumptionReplenishmentCtx = document.getElementById('consumptionReplenishmentChart')?.getContext('2d');
            if (consumptionReplenishmentCtx) {
                new Chart(consumptionReplenishmentCtx, {
                    type: 'bar',
                    data: {
                        labels: ['Semana 1', 'Semana 2', 'Semana 3', 'Semana 4'],
                        datasets: [{
                            label: 'Consumo',
                            data: [120, 150, 100, 130],
                            backgroundColor: 'rgba(255, 159, 64, 0.6)',
                            borderColor: 'rgba(255, 159, 64, 1)',
                            borderWidth: 1
                        }, {
                            label: 'Reposición',
                            data: [130, 140, 110, 125],
                            backgroundColor: 'rgba(75, 192, 192, 0.6)',
                            borderColor: 'rgba(75, 192, 192, 1)',
                            borderWidth: 1
                        }]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        scales: {
                            x: {
                                stacked: false,
                            },
                            y: {
                                stacked: false,
                                beginAtZero: true
                            }
                        }
                    }
                });
            }
        }

        // Initial load of the Dashboard module
        window.addEventListener('load', () => {
            adjustSidebarForScreenSize();
            loadModule('Dashboard'); // Load Dashboard content by default
        });
        window.addEventListener('resize', adjustSidebarForScreenSize);
    </script>
</body>
</html>
